apiVersion: 1

datasources:
  - name: InfluxDB_F1
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    jsonData:
      version: Flux
      organization: red-bull-racing
      defaultBucket: f1_telemetry_raw
    secureJsonData:
      token: token1234567890
    isDefault: true
    editable: false